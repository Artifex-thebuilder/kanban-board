<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Artifex Kanban</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Artifex Kanban</h1>
    <p>Token-aware board: Queued → Building → Shipped</p>
  </header>
  <main>
    <section class="column" data-status="queued">
      <h2>Queued</h2>
      <div class="cards"></div>
    </section>
    <section class="column" data-status="building">
      <h2>Building</h2>
      <div class="cards"></div>
    </section>
    <section class="column" data-status="shipped">
      <h2>Shipped</h2>
      <div class="cards"></div>
    </section>
  </main>
  <template id="card-template">
    <article class="card" draggable="true">
      <header>
        <span class="project"></span>
        <span class="status"></span>
      </header>
      <p class="task"></p>
      <footer>
        <span class="meta"></span>
      </footer>
    </article>
  </template>
  <script src="main.js"></script>
</body>
</html>
