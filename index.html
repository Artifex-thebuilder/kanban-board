<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Artifex Kanban</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Artifex Kanban</h1>
    <p>Token-aware board: Queued → Building → Shipped</p>
  </header>
  <main>
    <section class="column" data-status="backlog">
      <h2>Backlog</h2>
      <div class="cards"></div>
    </section>
    <section class="column" data-status="in-progress">
      <h2>In Progress</h2>
      <div class="cards"></div>
    </section>
    <section class="column" data-status="done">
      <h2>Done</h2>
      <div class="cards"></div>
    </section>
    <section class="column" data-status="skipped">
      <h2>Skipped</h2>
      <div class="cards"></div>
    </section>
    <section class="column" data-status="escalated">
      <h2>Escalated</h2>
      <div class="cards"></div>
    </section>
  </main>
  <section class="log">
    <h2>Work Log</h2>
    <ul id="worklog"></ul>
  </section>
  <template id="card-template">
    <article class="card">
      <header>
        <span class="title"></span>
        <span class="priority"></span>
      </header>
      <p class="reason"></p>
      <ul class="details">
        <li><strong>Task:</strong> <span class="task_type"></span></li>
        <li><strong>Route:</strong> <span class="route"></span></li>
        <li><strong>Model:</strong> <span class="model"></span></li>
        <li><strong>Cache:</strong> <span class="cache"></span></li>
        <li><strong>Cost:</strong> <span class="cost"></span></li>
      </ul>
      <footer>
        <span class="status"></span>
      </footer>
    </article>
  </template>
  <script src="main.js"></script>
</body>
</html>
